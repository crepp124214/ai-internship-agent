services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: internship-agent-postgres
    environment:
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_password
      POSTGRES_DB: internship_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: internship-agent-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: internship-agent-app
    env_file:
      - ../.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DATABASE_URL: postgresql://agent_user:agent_password@postgres:5432/internship_agent
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - agent-network

volumes:
  postgres_data:
  redis_data:

networks:
  agent-network:
    driver: bridge
