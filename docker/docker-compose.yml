services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: internship-agent-postgres
    environment:
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_password
      POSTGRES_DB: internship_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d internship_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: internship-agent-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: internship-agent-app
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      SECRET_KEY: dev-docker-secret-key-please-change-in-production
      DATABASE_URL: postgresql+psycopg://agent_user:agent_password@postgres:5432/internship_agent
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      SEED_DEMO_ON_BOOT: ${SEED_DEMO_ON_BOOT:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - agent-network

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: internship-agent-frontend
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - agent-network

volumes:
  postgres_data:
  redis_data:

networks:
  agent-network:
    driver: bridge
