# docker-compose.test.yml - Test environment for AI Internship Agent
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: internship-agent-test-postgres
    environment:
      POSTGRES_DB: ai_internship_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-test-network
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: internship-agent-test-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agent-test-network
    volumes:
      - redis_test_data:/data

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: internship-agent-test-backend
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: testing
      APP_DEBUG: "true"
      DATABASE_URL: postgresql://test_user:test_password@postgres:5432/ai_internship_test
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-test-key-for-ci}
      LLM_PROVIDER: mock
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      SEED_DEMO_ON_BOOT: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src
      - ../tests:/app/tests
    networks:
      - agent-test-network

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: internship-agent-test-frontend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - agent-test-network

volumes:
  postgres_test_data:
  redis_test_data:

networks:
  agent-test-network:
    driver: bridge
