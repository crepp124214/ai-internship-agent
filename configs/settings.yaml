# AI实习求职Agent系统 - 主配置文件

app:
  name: "AI Internship Agent"
  env: "development"
  debug: true
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "minimax"
  default_model: "abab6.5s-chat"
  temperature: 0.7
  max_tokens: 2000
  base_url: "https://api.minimax.chat/v1"

agents:
  resume_agent:
    enabled: true
    model: "abab6.5s-chat"
  job_agent:
    enabled: true
    model: "abab6.5s-chat"
    sources:
      - bosszhipin
      - liepin
      - lagou
  interview_agent:
    enabled: true
    model: "abab6.5s-chat"
    question_bank_path: "./data/interview_questions"

database:
  postgres:
    pool_size: 20
    max_overflow: 10
  redis:
    max_connections: 50

logging:
  level: "INFO"
  format: "json"  # json or console
